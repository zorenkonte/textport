name: Release APK

# Builds a signed, installable Textport APK and, for version tags, publishes it
# as a GitHub Release asset. Also runnable on demand from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to cut (e.g. v1.0). Leave blank to only build the APK artifact without publishing a release."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Assemble release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Determine version name
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          # A tag push, or a manual run with a version, publishes a release.
          # A manual run with no version only builds the APK artifact.
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          elif [ -n "${INPUT_VERSION}" ]; then
            echo "name=${INPUT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sign APK
        id: sign
        env:
          # Optional: set these repository secrets to sign with a stable key so
          # releases upgrade in place. Without them a fresh self-signed key is
          # generated per run (installable, but you must uninstall the previous
          # build before installing a new one).
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
        run: |
          set -euo pipefail
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          OUT="textport-${VERSION_NAME}.apk"

          if [ -n "${KEYSTORE_BASE64:-}" ]; then
            echo "Signing with the keystore from repository secrets."
            echo "$KEYSTORE_BASE64" | base64 -d > release.jks
            STORE_PASS="$KEYSTORE_PASSWORD"
            KEY_PASS="$KEY_PASSWORD"
            ALIAS="$KEY_ALIAS"
          else
            echo "No signing secrets set; generating an ephemeral self-signed key."
            STORE_PASS="textport"
            KEY_PASS="textport"
            ALIAS="textport"
            keytool -genkeypair -keystore release.jks -alias "$ALIAS" \
              -storepass "$STORE_PASS" -keypass "$KEY_PASS" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Textport, O=Textport, C=US"
          fi

          BUILD_TOOLS="$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)"
          "$BUILD_TOOLS/zipalign" -f 4 "$UNSIGNED" aligned.apk
          "$BUILD_TOOLS/apksigner" sign \
            --ks release.jks \
            --ks-pass "pass:$STORE_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --ks-key-alias "$ALIAS" \
            --out "$OUT" aligned.apk
          "$BUILD_TOOLS/apksigner" verify "$OUT"
          rm -f release.jks aligned.apk
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: textport-apk
          path: ${{ steps.sign.outputs.apk }}
          if-no-files-found: error

      - name: Publish GitHub Release
        # Runs for tag pushes and for manual runs that supplied a version. When
        # the tag doesn't exist yet the action creates it at the built commit.
        if: steps.version.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.name }}
          files: ${{ steps.sign.outputs.apk }}
          generate_release_notes: true
